name: red-main-watchdog

# Adopting the estate's shared red-main watchdog (one `uses:` line — the reusable workflow and
# its rationale live in the Library repo).
#
# Scheduled, not on push, because the failure it catches is DURATION: a main that has been red
# for days while everyone assumes it is green. Two estate repos were exactly that in July 2026.

on:
  schedule:
    - cron: "30 15 * * *"   # daily, staggered across the estate
  workflow_dispatch:

jobs:
  red-main:
    uses: aigovops-foundation/aigovops-library-june-ken-bob/.github/workflows/reusable-red-main-watchdog.yml@main
    with:
      max_red_hours: 48
