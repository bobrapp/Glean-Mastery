name: pages
on:
  push: { branches: [main] }
  workflow_dispatch:
permissions: { contents: read, pages: write, id-token: write }
concurrency: { group: pages, cancel-in-progress: true }
jobs:
  deploy:
    environment: { name: github-pages, url: "${{ steps.deploy.outputs.page_url }}" }
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run validate        # hard gate: typecheck + manifest + schema validation must pass before deploy
      - run: npm run build:site       # render content/weeks/*.mdx + quizzes + sources -> site/
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        with: { enablement: true }    # stand Pages up on first run (needs the repo to be public, or Pro for private)
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with: { path: site }
      - id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
